<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toy World</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
<h1>🧸 Toy World</h1>

</header>

<nav>
<a href="#">Home</a>
<a href="#">Toys</a>
<a href="#">Contact</a>
</nav>

<section class="container">

<div class="toy-grid">

<img src="images/teddy.jpg">

<p>$15</p>
<button onclick="buyToy('Teddy Bear')">Buy Now</button>
</div>

<div class="toy-card">
<img src="images/remote car.jpg">
<h3>Remote Car</h3>
<p>$25</p>
<button onclick="buyToy('Remote Car')">Buy Now</button>
</div>

<div class="toy-card">
<img src="images/bulding blocks.jpg">
<h3>Building Blocks</h3>
<p>$20</p>
<button onclick="buyToy('Building Blocks')">Buy Now</button>
</div>

</div>

</section>

<footer>
<p>© 2026 Toy World</p>
</footer>

<script src="script.js"></script>

</html>
